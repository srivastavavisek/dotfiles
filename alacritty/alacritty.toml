[general]
import = [
    "~/dotfiles/alacritty/catppuccin-mocha.toml",
]

[window]
decorations = "None"
dynamic_title = true
opacity = 0.94

[window.padding]
x = 6
y = 6

[scrolling]
history = 10000
multiplier = 4

[font]
size = 11.5
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
#builtin_box_drawing = true

[colors]
transparent_background_colors = true

[colors.vi_mode_cursor]
text = "#1e1e2e"       # dark surface
cursor = "#94e2d5"     # bright aqua

[colors.search.matches]
foreground = "#cdd6f4"
background = "#45475a"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#f38ba8"

#[colors.line_indicator]
#foreground = "#f5e0dc"
#background = "#585b70"

#[colors.footer_bar]
#foreground = "#cdd6f4"
#background = "#313244"

[bell]
animation = "EaseOutCubic"
duration = 120
color = "#cdd6f4"
#command = { program = "paplay", args = ["~/dotfiles/alacritty/freesoundorg_glasstap_unicornaphobist.wav"] }


